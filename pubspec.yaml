name: grid_frontend
description: "Grid: Private Location Sharing"
publish_to: 'none'
version: 2.0.0+738
environment:
  sdk: '>=3.3.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  flutter_map: ^7.0.2
  maplibre_gl: ^0.26.0
  google_fonts: ^8.1.0
  timeago: ^3.1.0
  latlong2: ^0.9.1
  flutter_map_marker_popup: ^7.0.0
  flutter_map_location_marker: ^9.1.1
  flutter_map_marker_cluster: ^1.3.6
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  matrix: ^4.0.0
  flutter_vodozemac: ^0.4.1
  flutter_secure_storage: ^9.2.2
  flutter_emoji: ^2.5.1
  path_provider: ^2.1.4
  sqflite: ^2.3.3+1
  crypto: ^3.0.4
  encrypt: ^5.0.3
  flutter_map_cancellable_tile_provider: ^3.0.2  # Downgraded to a compatible version
  flutter_launcher_icons: ^0.14.2
  random_avatar: any # or the latest version on Pub
  url_launcher: ^6.3.0
  http: ^1.2.2
  vector_map_tiles: ^8.0.0
  vector_map_tiles_pmtiles: ^1.3.0
  flutter_intl_phone_field: ^0.0.7
  lottie: ^3.1.2
  sleek_circular_slider: ^2.0.1
  flutter_slidable: ^3.1.1
  flutter_dotenv: ^5.1.0
  permission_handler: ^11.3.1
  qr_flutter: ^4.1.0
  flutter_bloc: ^8.1.6
  collection: ^1.18.0
  equatable: ^2.0.7
  libre_location: ^0.3.0
  hive: ^2.2.3
  qr_code_scanner_plus: ^2.0.6
  package_info_plus: ^8.1.2
  image_picker: ^1.1.2
  image_cropper: ^8.0.2
  in_app_purchase: ^3.2.0
  font_awesome_flutter: ^10.7.0
  share_plus: ^10.1.2
  passkeys: ^2.17.0
  webview_flutter: ^4.10.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.0
  unifiedpush: ^6.0.1
  google_api_availability: ^5.0.1


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/brand/04-app-icon/grid-app-icon-appstore-1024.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#191B1E"
  adaptive_icon_foreground: "assets/brand/04-app-icon/grid-app-icon-1024.png"
  adaptive_icon_padding: false

flutter_native_splash:
  color: "#F8F8F7"
  color_dark: "#0B0D0F"
  image: "assets/brand/01-logos/grid-symbol-color-512.png"
  image_dark: "assets/brand/01-logos/grid-symbol-color-dark-512.png"
  android_12:
    image: "assets/brand/01-logos/grid-symbol-color-512.png"
    image_dark: "assets/brand/01-logos/grid-symbol-color-dark-512.png"
    color: "#F8F8F7"
    color_dark: "#0B0D0F"
  ios: true
  android: true
  fullscreen: true

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_native_splash: ^2.3.10
  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  build_runner: ^2.4.8
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

dependency_overrides:
  flutter_rust_bridge:
    path: patches/flutter_rust_bridge

flutter:
  uses-material-design: true
  assets:
    - assets/brand/01-logos/grid-symbol-color-1024.png
    - assets/brand/01-logos/grid-symbol-color-dark-1024.png
    - assets/brand/02-wordmark/grid-wordmark-ink-1800.png
    - assets/brand/02-wordmark/grid-wordmark-white-1800.png
    - assets/lottie/lottie-phone-pin.json
    - assets/lottie/lottie-phone-verify.json
    - assets/extras/satellite.png
    - assets/extras/basemaps.png
    - assets/geocoder/cities500.bin.gz
    - .env

  fonts:
    - family: GridFont
      fonts:
        - asset: assets/fonts/fontawesome-webfont.ttf
          weight: 700
